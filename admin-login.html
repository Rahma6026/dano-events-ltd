<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Dano Events</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Jost', sans-serif;
            background-color: #fcfcfc;
            background-image: radial-gradient(#ffe0e9 1px, transparent 1px);
            background-size: 20px 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            padding: 3rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
        }
        .input-group { margin-bottom: 1.5rem; }
        .input-label { display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.5rem; }
        .input-field { width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 0.375rem; outline: none; transition: border-color 0.2s; }
        .input-field:focus { border-color: #ff6b8b; box-shadow: 0 0 0 1px #ff6b8b; }
        .btn-primary { background-color: #ff6b8b; color: white; padding: 0.75rem 2rem; border-radius: 0.375rem; font-weight: 500; transition: background-color 0.2s; cursor: pointer; width: 100%; }
        .btn-primary:hover { background-color: #e55a7a; }
        .btn-primary:disabled { background-color: #fca5a5; cursor: not-allowed; }
        .error-message { color: #ef4444; font-size: 0.875rem; margin-top: 1rem; text-align: center; display: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-semibold mb-2" style="color: #590d22;">Dano Events</h1>
            <p class="text-gray-500">Admin Control Panel</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label class="input-label" for="email">Email Address</label>
                <input type="email" id="email" class="input-field" required placeholder="admin@danoevents.co.uk">
            </div>
            <div class="input-group mb-6">
                <label class="input-label" for="password">Password</label>
                <input type="password" id="password" class="input-field" required placeholder="••••••••">
            </div>
            <button type="submit" id="loginBtn" class="btn-primary">Sign In</button>
            <div id="errorMsg" class="error-message">Invalid login credentials.</div>
        </form>
    </div>

    <script>
        // Check if already logged in locally
        if (localStorage.getItem('dano_admin_auth') === 'true') {
            window.location.href = 'adminpanel.html';
        }

        // Handle Login
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            errorMsg.style.display = 'none';

            // HARDCODED CREDENTIALS
            if (email === 'admin@danoevents.co.uk' && password === 'admin123') {
                localStorage.setItem('dano_admin_auth', 'true');
                window.location.href = 'adminpanel.html';
            } else {
                errorMsg.innerText = 'Invalid email or password.';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
